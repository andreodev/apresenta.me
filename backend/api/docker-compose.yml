services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: apresenta_me_api
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/apresenta_me_db?sslmode=disable
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: apresenta_me_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: apresenta_me_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: